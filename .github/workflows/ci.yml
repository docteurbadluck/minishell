name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libreadline-dev expect

      - name: Build
        run: make

      - name: Unit tests
        run: make test

      - name: Tester
        run: make tester

      - name: Signal tests
        run: make signals
